<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">

  <title>Design AI Lab</title>

  <meta
    name="description"
    content="Design Informatics Lab has been renamed Design AI Lab."
  >

  <meta
    http-equiv="refresh"
    content="0; url=https://designai.hanyang.ac.kr/"
  >

  <link
    rel="canonical"
    href="https://designai.hanyang.ac.kr/"
  >

  <script>
    (function () {
      const targetOrigin = "https://designai.hanyang.ac.kr";

      const targetUrl =
        targetOrigin +
        window.location.pathname +
        window.location.search +
        window.location.hash;

      window.location.replace(targetUrl);
    })();
  </script>
</head>

<body>
  <main>
    <h1>Design AI Lab</h1>

    <p>
      Design Informatics Lab has been renamed
      <strong>Design AI Lab</strong>.
    </p>

    <p>
      You are being redirected to
      <a id="redirect-link" href="https://designai.hanyang.ac.kr/">
        designai.hanyang.ac.kr
      </a>.
    </p>
  </main>

  <script>
    const link = document.getElementById("redirect-link");

    link.href =
      "https://designai.hanyang.ac.kr" +
      window.location.pathname +
      window.location.search +
      window.location.hash;
  </script>
</body>
</html>
